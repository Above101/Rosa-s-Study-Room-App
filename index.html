<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosa's Study Room</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F2;--surface:#FFFFFF;--surface-alt:#F0EEE8;--border:#DDD9D0;--border-strong:#C4BFB4;
  --text:#1A1916;--text-2:#5C5A54;--text-3:#9C9A94;
  --accent:#1B4F8A;--accent-bg:#EBF0F8;--accent-border:#A8C0DC;
  --success:#1A6640;--success-bg:#EAF4EE;--success-border:#A0CCAF;
  --danger:#8A1B1B;--danger-bg:#F8EBEB;--danger-border:#DCA8A8;
  --warn-bg:#FBF5E6;--warn-border:#DFC98A;--warn-text:#6B4F0A;
  --radius:6px;--radius-lg:10px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
.header{background:var(--accent);color:white;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-brand{font-family:'Lora',serif;font-size:16px;font-weight:500;color:white;display:flex;align-items:center;gap:10px}
.header-brand span{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;background:rgba(255,255,255,.18);padding:2px 8px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:12px;font-size:13px;color:rgba(255,255,255,.8)}
.streak-badge{background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.btn-logout{background:none;border:1px solid rgba(255,255,255,.3);color:white;padding:4px 12px;border-radius:var(--radius);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif}
.btn-logout:hover{background:rgba(255,255,255,.1)}
.main{max-width:740px;margin:0 auto;padding:2rem 1.5rem 4rem}

/* Auth */
.auth-wrap{max-width:420px;margin:4rem auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem}
.auth-photo{text-align:center;margin-bottom:1.25rem}
.auth-photo img{width:88px;height:88px;border-radius:50%;object-fit:cover;object-position:center 20%;border:3px solid var(--accent-border)}
.auth-title{font-family:'Lora',serif;font-size:22px;font-weight:500;text-align:center;margin-bottom:.35rem}
.auth-motto{font-size:14px;font-weight:600;color:var(--accent);text-align:center;margin-bottom:.25rem}
.auth-verse{font-size:12px;color:var(--text-2);font-style:italic;text-align:center;line-height:1.7;margin-bottom:.15rem}
.auth-ref{font-size:11px;color:var(--text-3);text-align:center;margin-bottom:1.5rem}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.field input,.field select{width:100%;padding:10px 14px;border:1px solid var(--border-strong);border-radius:var(--radius);font-size:14px;background:var(--surface);color:var(--text);font-family:'Inter',sans-serif}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(27,79,138,.1)}
.btn{padding:9px 20px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:all .1s}
.btn:hover{background:var(--surface-alt)}
.btn-primary{background:var(--accent);color:white;border-color:var(--accent);width:100%}
.btn-primary:hover{background:#163F70}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{padding:6px 14px;font-size:12px;width:auto}
.btn-danger{border-color:var(--danger-border);color:var(--danger)}
.error-box{background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--danger);margin-top:10px}
.success-box{background:var(--success-bg);border:1px solid var(--success-border);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--success);margin-top:10px}

/* Dashboard tabs */
.dash-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.dash-tab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.dash-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Cards & stats */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.stat-n{font-size:24px;font-weight:600;color:var(--text)}
.stat-l{font-size:12px;color:var(--text-3);margin-top:2px}

/* Countdown banner */
.countdown-banner{background:var(--accent);color:white;border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between}
.countdown-days{font-size:32px;font-weight:600;line-height:1}
.countdown-label{font-size:12px;opacity:.8;margin-top:2px}
.countdown-right{font-size:13px;opacity:.85;text-align:right}

/* Daily goal ring */
.goal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;align-items:center;gap:16px;margin-bottom:1.5rem}
.goal-ring{flex-shrink:0}
.goal-text .goal-count{font-size:20px;font-weight:600;color:var(--text)}
.goal-text .goal-sub{font-size:12px;color:var(--text-3)}

/* Progress grid */
.progress-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
@media(max-width:520px){.progress-grid{grid-template-columns:1fr}}
.prog-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;position:relative}
.prog-card-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.prog-card-law{font-size:10px;color:var(--text-3);margin-bottom:8px}
.prog-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-bottom:6px}
.prog-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.prog-card-stats{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-3)}
.prog-card-pct{font-size:18px;font-weight:600}
.ready-badge{position:absolute;top:10px;right:10px;font-size:11px;background:var(--success-bg);color:var(--success);border:1px solid var(--success-border);padding:2px 7px;border-radius:20px;font-weight:600}
.sparkline{display:block;margin-top:6px}

/* Section picker */
.section-label{font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.75rem}
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
@media(max-width:520px){.section-grid{grid-template-columns:1fr}}
.sec-btn{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text-2);font-size:12px;cursor:pointer;text-align:left;line-height:1.45;font-family:'Inter',sans-serif;transition:all .1s}
.sec-btn:hover{border-color:var(--accent-border);color:var(--text)}
.sec-btn.active{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.sec-cite{font-size:10px;display:block;margin-bottom:2px;font-weight:600;letter-spacing:.04em;opacity:.7}
.sec-actions{display:flex;gap:8px;margin-bottom:1.5rem}
.controls-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-top:1px solid var(--border);padding-top:1.25rem}
.controls-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.field-label{font-size:13px;color:var(--text-2)}
select.pick{font-size:13px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:'Inter',sans-serif;cursor:pointer}
.toggle-wrap{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2)}
.toggle{position:relative;display:inline-block;width:36px;height:20px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border-strong);border-radius:20px;transition:.2s}
.toggle-slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px)}

/* Loading */
.loading{text-align:center;padding:4rem 1rem}
.spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 1.25rem}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--text-2);font-size:14px}
.loading small{color:var(--text-3);font-size:12px;display:block;margin-top:4px}

/* Quiz */
.timer-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-bottom:1rem;overflow:hidden}
.timer-bar{height:100%;background:var(--accent);border-radius:2px;transition:width 1s linear}
.progress-wrap{margin-bottom:.75rem}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-3);margin-bottom:6px}
.progress-bar{height:3px;background:var(--border);border-radius:2px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .35s ease}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.75rem;margin-bottom:1rem}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase}
.tag-ex{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border)}
.tag-gen{background:#F0EBF8;color:#4A1B8A;border:1px solid #C0A8DC}
.q-section{font-size:12px;color:var(--text-3)}
.bookmark-btn{margin-left:auto;background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-3);padding:2px 4px;line-height:1}
.bookmark-btn.active{color:#F5A623}
.q-text{font-size:16px;font-weight:500;line-height:1.6;color:var(--text);margin-bottom:1.25rem}
.option{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:background .1s,border-color .1s}
.option:hover:not(.locked){border-color:var(--accent-border);background:var(--accent-bg)}
.option.selected{border-color:var(--accent);background:var(--accent-bg)}
.option.correct{border-color:var(--success-border);background:var(--success-bg)}
.option.wrong{border-color:var(--danger-border);background:var(--danger-bg)}
.option.locked{cursor:default}
.option-letter{width:26px;height:26px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;color:var(--text-3)}
.option.selected .option-letter{background:var(--accent);color:white;border-color:var(--accent)}
.option.correct .option-letter{background:var(--success);color:white;border-color:var(--success)}
.option.wrong .option-letter{background:var(--danger);color:white;border-color:var(--danger)}
.option-text{font-size:14px;color:var(--text);line-height:1.5;padding-top:3px}
.feedback{border-radius:var(--radius);padding:12px 16px;font-size:14px;line-height:1.6;margin-top:1rem}
.feedback.correct{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.feedback.wrong{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.feedback-cite{font-size:11px;margin-top:6px;opacity:.75;font-style:italic}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:.75rem}

/* Results */
.results-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem 2rem;text-align:center}
.score-pct{font-family:'Lora',serif;font-size:64px;font-weight:600;line-height:1}
.score-sub{font-size:14px;color:var(--text-2);margin-top:6px;margin-bottom:1rem}
.encourage-msg{font-size:14px;font-style:italic;color:var(--text-2);margin-bottom:1.5rem;line-height:1.6;padding:0 1rem}
.results-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.review-box{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius);padding:12px 16px;text-align:left;margin-bottom:1.5rem}
.review-title{font-size:12px;font-weight:600;color:var(--warn-text);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.results-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.save-status{font-size:12px;color:var(--text-3);margin-top:12px}

/* Badges */
.badges-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text-2)}
.badge.earned{border-color:#F5A623;background:#FFF8EC;color:#7B4F00;font-weight:500}
.badge-icon{font-size:16px}

/* History */
.history-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.history-date{font-size:12px;color:var(--text-3)}
.history-sections{font-size:12px;color:var(--text-2);margin-top:2px;max-width:360px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-pct{font-size:22px;font-weight:600;text-align:right}
.history-detail{font-size:11px;color:var(--text-3);text-align:right;margin-top:1px}

/* Bookmarks */
.bookmark-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.bookmark-q{font-size:14px;font-weight:500;color:var(--text);margin-bottom:6px}
.bookmark-section{font-size:11px;color:var(--text-3);margin-bottom:8px}
.bookmark-actions{display:flex;gap:8px}

/* Settings */
.settings-section{margin-bottom:1.5rem}
.settings-title{font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.75rem}

/* Weekly summary */
.weekly-box{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--radius-lg);padding:16px;margin-bottom:1.5rem}
.weekly-title{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.weekly-stats{display:flex;gap:24px;font-size:13px;color:var(--text-2)}
.weekly-stats strong{color:var(--text);font-weight:600}

/* Celebration overlay */
.celebration{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.celebration-card{background:white;border-radius:var(--radius-lg);padding:2.5rem;text-align:center;max-width:320px;animation:popIn .4s}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.celebration-icon{font-size:56px;margin-bottom:.75rem}
.celebration-title{font-family:'Lora',serif;font-size:20px;font-weight:600;margin-bottom:.5rem}
.celebration-sub{font-size:14px;color:var(--text-2);margin-bottom:1.5rem;line-height:1.5}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-3);font-size:14px}
.divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
</style>
</head>
<body>
<header class="header">
  <div class="header-brand">Rosa's Study Room <span>Oklahoma NHA</span></div>
  <div class="header-right">
    <span id="header-streak" class="streak-badge" style="display:none"></span>
    <span id="header-score" style="font-weight:500"></span>
    <button class="btn-logout" id="logout-btn" style="display:none" onclick="logout()">Sign out</button>
  </div>
</header>
<main class="main"><div id="app"></div></main>
<div id="celebration" class="celebration" style="display:none" onclick="closeCelebration()">
  <div class="celebration-card" onclick="event.stopPropagation()">
    <div class="celebration-icon" id="cel-icon"></div>
    <div class="celebration-title" id="cel-title"></div>
    <div class="celebration-sub" id="cel-sub"></div>
    <button class="btn btn-primary" onclick="closeCelebration()" style="width:auto;padding:9px 28px">Awesome! 🎉</button>
  </div>
</div>

<script>

  {id:'ltcala',     label:'LTC Administrator Licensing Act',     law:'63 O.S. § 1-1949.1',               file:'01_ltcala_LTC_Administrator_Licensing_Act.pdf'},

const st = {

  token: localStorage.getItem('token') || '',

  displayName: localStorage.getItem('displayName') || '',

// ── Helpers ──────────────────────────────────────────────────────────
function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}
function today(){return new Date().toISOString().split('T')[0]}
function daysUntil(dateStr){
  if(!dateStr)return null;
  const diff=new Date(dateStr)-new Date();
  return Math.ceil(diff/(1000*60*60*24));
}
function sparklineSVG(values){
  if(!values||values.length<2)return '';
  const w=80,h=24,pad=2;
  const min=Math.min(...values),max=Math.max(...values);
  const range=max-min||1;
  const pts=values.map((v,i)=>{
    const x=pad+(i/(values.length-1))*(w-pad*2);
    const y=h-pad-((v-min)/range)*(h-pad*2);
    return `${x},${y}`;
  }).join(' ');
  const trend=values[values.length-1]>=values[0];
  return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${pts}" fill="none" stroke="${trend?'var(--success)':'var(--danger)'}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

async function api(action, body={}, extraHeaders={}){
  const r = await fetch(WORKER_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json','x-action':action,'Authorization':`Bearer ${st.token}`,...extraHeaders},
    body:JSON.stringify(body)
  });
  return r.json();
}

function resetDayCountIfNeeded(){
  if(st.todayDate!==today()){
    st.todayCount=0;
    st.todayDate=today();
    localStorage.setItem('todayCount','0');
    localStorage.setItem('todayDate',today());
  }
}

function updateStreak(){
  const sessions=st.sessions;
  if(!sessions.length){st.streak=0;return;}
  const days=[...new Set(sessions.map(s=>s.created_at.split('T')[0]))].sort().reverse();
  let streak=0,check=today();
  for(const d of days){
    if(d===check){streak++;const dt=new Date(check);dt.setDate(dt.getDate()-1);check=dt.toISOString().split('T')[0];}
    else if(d<check)break;
  }
  st.streak=streak;
}

function computeWeekly(){
  const monday=new Date();
  monday.setDate(monday.getDate()-monday.getDay()+1);
  monday.setHours(0,0,0,0);
  const weekSessions=st.sessions.filter(s=>new Date(s.created_at)>=monday);
  if(!weekSessions.length){st.weeklyData=null;return;}
  const totalQ=weekSessions.reduce((a,s)=>a+s.total,0);
  const totalScore=weekSessions.reduce((a,s)=>a+s.score,0);
  const avgPct=Math.round((totalScore/totalQ)*100);
  st.weeklyData={sessions:weekSessions.length,questions:totalQ,avgPct};
}

// ── Render ────────────────────────────────────────────────────────────
function render(){
  resetDayCountIfNeeded();
  const app=document.getElementById('app');
  const scoreEl=document.getElementById('header-score');
  const streakEl=document.getElementById('header-streak');
  const logoutBtn=document.getElementById('logout-btn');

  if(st.view==='quiz'&&st.questions.length){
    const done=st.cur+(st.answered?1:0);
    scoreEl.textContent=done>0?`${st.score}/${done}`:'';
  } else scoreEl.textContent='';

  if(st.streak>0&&st.token){streakEl.textContent=`🔥 ${st.streak}`;streakEl.style.display='block';}
  else streakEl.style.display='none';
  logoutBtn.style.display=st.token?'block':'none';

  if(st.view==='auth')        app.innerHTML=authView();
  else if(st.view==='dashboard') app.innerHTML=dashView();
  else if(st.view==='loading')   app.innerHTML=loadingView();
  else if(st.view==='quiz')      app.innerHTML=quizView();
  else if(st.view==='results')   app.innerHTML=resultsView();
  bind();
}

function progressTab(){
  const totalSessions=st.progress.reduce((a,p)=>a+p.sessions_taken,0);
  const totalQ=st.progress.reduce((a,p)=>a+p.total_questions,0);
  const totalCorrect=st.progress.reduce((a,p)=>a+p.correct_answers,0);
  const overallPct=totalQ>0?Math.round((totalCorrect/totalQ)*100):0;

  // Per-section sparkline data from sessions
  const sectionHistory={};
  [...st.sessions].reverse().forEach(s=>{
    (s.section_ids||[]).forEach(sid=>{
      if(!sectionHistory[sid])sectionHistory[sid]=[];
      if(sectionHistory[sid].length<5)sectionHistory[sid].push(s.pct);
    });
  });

  const cards=SECTIONS.map(s=>{
    const p=st.progress.find(x=>x.section_id===s.id);
    const pct=p?Math.round((p.correct_answers/Math.max(p.total_questions,1))*100):0;
    const color=pct>=80?'#1A6640':pct>=60?'var(--accent)':'#8A1B1B';
    const ready=p&&p.sessions_taken>=3&&pct>=80;
    const spark=sparklineSVG(sectionHistory[s.id]||[]);
    return `<div class="prog-card">
      ${ready?`<div class="ready-badge">✓ Ready</div>`:''}
      <div class="prog-card-title">${s.label}</div>
      <div class="prog-card-law">${s.law}</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="prog-card-stats">
        <span class="prog-card-pct" style="color:${color}">${p?pct+'%':'—'}</span>
        <span style="font-size:11px">${p?p.correct_answers+'/'+p.total_questions:''}</span>
      </div>
      ${p?`<div style="font-size:11px;color:var(--text-3);margin-top:4px">${p.sessions_taken} session${p.sessions_taken!==1?'s':''} · ${new Date(p.last_taken).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>`:'<div style="font-size:11px;color:var(--text-3);margin-top:4px;font-style:italic">Not started</div>'}
      ${spark}
    </div>`;
  }).join('');

  const earnedIds=st.badges.map(b=>b.badge_id);
  const badgeHtml=BADGES_DEF.map(b=>`<div class="badge ${earnedIds.includes(b.id)?'earned':''}">
    <span class="badge-icon">${b.icon}</span>${b.name}
  </div>`).join('');

  return `${totalSessions>0?`<div class="stat-row">
    <div class="stat"><div class="stat-n">${overallPct}%</div><div class="stat-l">Overall accuracy</div></div>
    <div class="stat"><div class="stat-n">${totalSessions}</div><div class="stat-l">Sessions</div></div>
    <div class="stat"><div class="stat-n">${totalQ}</div><div class="stat-l">Questions answered</div></div>
  </div>`:''}
  <div class="section-label">Badges</div>
  <div class="badges-row">${badgeHtml}</div>
  <div class="section-label">Section Progress</div>
  <div class="progress-grid">${cards}</div>
  <div style="font-size:12px;color:var(--text-3);margin-top:-.5rem">✓ Ready = 3+ sessions & 80%+ accuracy · Sparklines show last 5 sessions</div>`;
}

// ── QUIZ VIEW ─────────────────────────────────────────────────────────
function quizView(){
  const q=st.questions[st.cur];
  const total=st.questions.length;
  const pct=Math.round(st.cur/total*100);
  const L=['A','B','C','D'];
  const isBookmarked=st.bookmarks.some(b=>b.question_text===q.question);
  const opts=q.options.map((opt,i)=>{
    let cls='option';
    if(st.answered){cls+=' locked';if(i===q.correct)cls+=' correct';else if(i===st.sel)cls+=' wrong';}
    else if(i===st.sel)cls+=' selected';
    return `<div class="${cls}" data-i="${i}"><div class="option-letter">${L[i]}</div><div class="option-text">${opt}</div></div>`;
  }).join('');
  const feedback=st.answered?`<div class="feedback ${st.sel===q.correct?'correct':'wrong'}">
    <strong>${st.sel===q.correct?'Correct.':'Incorrect.'}</strong> ${q.explanation}
    ${q.cite?`<div class="feedback-cite">${q.cite}</div>`:''}
  </div>`:'';

  const timerBar=st.settings.timed_mode&&!st.answered?`<div class="timer-bar-wrap">
    <div class="timer-bar" id="timer-bar" style="width:${(st.timerVal/st.settings.timer_seconds)*100}%"></div>
  </div>`:'';

  return `<div class="progress-wrap">
    <div class="progress-meta"><span>Question ${st.cur+1} of ${total}</span><span>Score: ${st.score}/${st.cur+(st.answered?1:0)}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>
  ${timerBar}
  <div class="q-card">
    <div class="q-meta">
      <span class="tag ${q.type==='extracted'?'tag-ex':'tag-gen'}">${q.type==='extracted'?'Exam Q':'Generated'}</span>
      ${q.section?`<span class="q-section">${q.section}</span>`:''}
      <button class="bookmark-btn ${isBookmarked?'active':''}" id="bookmark-btn" title="Bookmark">🔖</button>
    </div>
    <div class="q-text">${q.question}</div>
    ${opts}${feedback}
  </div>
  <div class="nav-row">
    <span style="font-size:12px;color:var(--text-3)">${st.settings.timed_mode&&!st.answered?`⏱ ${st.timerVal}s`:''}</span>
    ${st.answered
      ?`<button class="btn btn-primary" id="next-btn" style="width:auto">${st.cur+1<total?'Next →':'See results →'}</button>`
      :`<button class="btn btn-primary" id="submit-btn" style="width:auto" ${st.sel===null?'disabled':''}>Check answer</button>`}
  </div>`;
}

// ── RESULTS VIEW ──────────────────────────────────────────────────────
function resultsView(){
  const total=st.questions.length;
  const pct=Math.round(st.score/total*100);

  // Encouraging message based on score + improvement
  let msg='';
  const scripture=SCRIPTURES[Math.floor(Math.random()*SCRIPTURES.length)];
  if(pct===100) msg=`Perfect score! 🌟 Absolutely incredible work. ${scripture}`;
  else if(pct>=90) msg=`Outstanding! 🎓 You're exam-ready on these sections. ${scripture}`;
  else if(pct>=80) msg=`Great work! 💪 You're solidly understanding this material. ${scripture}`;
  else if(pct>=70) msg=`Good progress! 📖 A few more sessions and you'll nail this. ${scripture}`;
  else if(pct>=60) msg=`Keep going! 🌱 Every quiz makes you stronger. ${scripture}`;
  else msg=`Don't give up! 🙏 Review the feedback above and try again. ${scripture}`;

  const missed=[...new Set(st.wrong.map(q=>q.section).filter(Boolean))].slice(0,5);
  return `<div class="results-card">
    <div class="score-pct" style="color:${pct>=80?'var(--success)':pct>=60?'var(--accent)':'var(--danger)'}">${pct}%</div>
    <div class="score-sub">${st.score} of ${total} correct</div>
    <div class="encourage-msg">${msg}</div>
    <div class="results-stats">
      <div class="stat"><div class="stat-n">${st.score}</div><div class="stat-l">Correct</div></div>
      <div class="stat"><div class="stat-n">${total-st.score}</div><div class="stat-l">Missed</div></div>
      <div class="stat"><div class="stat-n">${st.questions.filter(q=>q.type==='extracted').length}</div><div class="stat-l">Exam Qs</div></div>
    </div>
    ${missed.length?`<div class="review-box"><div class="review-title">Sections to review</div><div style="font-size:13px;color:var(--warn-text)">${missed.join(' · ')}</div></div>`:''}
    <div class="results-actions">
      <button class="btn btn-primary" id="retry-btn">Retake quiz</button>
      <button class="btn" id="back-dash-btn">Dashboard</button>
    </div>
    <div class="save-status" id="save-status">${st.saveStatus}</div>
  </div>`;
}

// ── BIND ──────────────────────────────────────────────────────────────
function bind(){
  // Auth tabs
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{st.authTab=el.dataset.tab;st.error='';st.msg='';render()});
  // Auth submit
  const authBtn=document.getElementById('auth-submit');
  if(authBtn)authBtn.onclick=handleAuth;
  // Dashboard tabs
  document.querySelectorAll('[data-dashtab]').forEach(el=>el.onclick=()=>{st.dashTab=el.dataset.dashtab;st.msg='';render()});
  // Section picker
  document.querySelectorAll('.sec-btn').forEach(btn=>btn.onclick=()=>{
    const id=btn.dataset.sec;
    const idx=st.selectedSections.indexOf(id);
    if(idx>=0)st.selectedSections.splice(idx,1);else st.selectedSections.push(id);
    render();
  });
  const selAll=document.getElementById('sel-all');
  if(selAll)selAll.onclick=()=>{st.selectedSections=SECTIONS.map(s=>s.id);render()};
  const selNone=document.getElementById('sel-none');
  if(selNone)selNone.onclick=()=>{st.selectedSections=[];render()};
  const qc=document.getElementById('q-count');
  if(qc)qc.onchange=e=>st.qCount=parseInt(e.target.value);
  // Start
  const startBtn=document.getElementById('start-btn');
  if(startBtn)startBtn.onclick=startQuiz;
  // Quiz options
  document.querySelectorAll('.option[data-i]').forEach(opt=>opt.onclick=()=>{
    if(!st.answered){st.sel=parseInt(opt.dataset.i);render();}
  });
  const submitBtn=document.getElementById('submit-btn');
  if(submitBtn)submitBtn.onclick=submitAnswer;
  const nextBtn=document.getElementById('next-btn');
  if(nextBtn)nextBtn.onclick=nextQuestion;
  const retryBtn=document.getElementById('retry-btn');
  if(retryBtn)retryBtn.onclick=()=>{
    clearTimer();
    st.cur=0;st.score=0;st.sel=null;st.answered=false;st.wrong=[];st.questionLog=[];st.saveStatus='';
    st.questions=shuffle(st.questions);st.view='quiz';startTimer();render();
  };
  const backBtn=document.getElementById('back-dash-btn');
  if(backBtn)backBtn.onclick=()=>{clearTimer();loadDashboard()};
  // Bookmark button in quiz
  const bmBtn=document.getElementById('bookmark-btn');
  if(bmBtn)bmBtn.onclick=()=>toggleBookmark(st.questions[st.cur]);
  // Unbookmark
  document.querySelectorAll('[data-unbookmark]').forEach(btn=>btn.onclick=()=>{
    const q=st.bookmarks[parseInt(btn.dataset.unbookmark)];
    if(q)toggleBookmark(q,true);
  });
  // Settings
  const saveSettingsBtn=document.getElementById('save-settings-btn');
  if(saveSettingsBtn)saveSettingsBtn.onclick=saveSettings;
  const timedToggle=document.getElementById('timed-toggle');
  if(timedToggle)timedToggle.onchange=e=>{st.settings.timed_mode=e.target.checked;render()};
}

// ── AUTH ──────────────────────────────────────────────────────────────
async function handleAuth(){
  st.error='';st.msg='';
  const email=document.getElementById('auth-email')?.value?.trim();
  const password=document.getElementById('auth-password')?.value?.trim();
  if(!email||!password){st.error='Please fill in all fields.';render();return;}
  const btn=document.getElementById('auth-submit');
  btn.disabled=true;btn.textContent='Please wait…';
  try{
    if(st.authTab==='signup'){
      const name=document.getElementById('auth-name')?.value?.trim()||email.split('@')[0];
      const data=await api('auth-signup',{email,password,display_name:name});
      if(data.error||data.msg)throw new Error(data.error||data.msg);
      st.msg='Account created! Check your email to confirm, then sign in.';
      st.authTab='signin';
    } else {
      const data=await api('auth-signin',{email,password});
      if(data.error)throw new Error(data.error);
      st.token=data.access_token;
      st.userId=data.user?.id;
      localStorage.setItem('token',st.token);
      localStorage.setItem('userId',st.userId);
      await loadDashboard();
      return;
    }
  }catch(e){st.error=e.message;}
  render();
}

function logout(){
  clearTimer();
  localStorage.clear();
  Object.assign(st,{token:'',userId:'',displayName:'',progress:[],sessions:[],bookmarks:[],badges:[],view:'auth',error:'',msg:'',streak:0,todayCount:0});
  render();
}

async function loadDashboard(){
  try{
    const [profData,prog,sess,bmarks]=await Promise.all([
      api('get-profile'),
      api('get-progress'),
      api('get-sessions'),
      api('get-bookmarks'),
    ]);
    st.displayName=profData.profile?.display_name||'';
    st.settings={...st.settings,...(profData.settings||{})};
    st.badges=Array.isArray(profData.badges)?profData.badges:[];
    localStorage.setItem('displayName',st.displayName);
    st.progress=Array.isArray(prog)?prog:[];
    st.sessions=Array.isArray(sess)?sess:[];
    st.bookmarks=Array.isArray(bmarks)?bmarks:[];
    updateStreak();
    computeWeekly();
  }catch(e){console.warn('loadDashboard error',e);}
  st.view='dashboard';st.error='';
  render();
}

// ── SETTINGS ─────────────────────────────────────────────────────────
async function saveSettings(){
  const examDate=document.getElementById('exam-date')?.value||null;
  const dailyGoal=parseInt(document.getElementById('daily-goal')?.value||10);
  const timedMode=document.getElementById('timed-toggle')?.checked||false;
  const timerSecs=parseInt(document.getElementById('timer-secs')?.value||30);
  st.settings={...st.settings,exam_date:examDate,daily_goal:dailyGoal,timed_mode:timedMode,timer_seconds:timerSecs};
  try{
    await api('save-settings',{user_id:st.userId,exam_date:examDate||null,daily_goal:dailyGoal,timed_mode:timedMode,timer_seconds:timerSecs,updated_at:new Date().toISOString()});
    st.msg='Settings saved ✓';
  }catch(e){st.msg='Saved locally (sync failed)';}
  render();
}

// ── QUIZ LOGIC ────────────────────────────────────────────────────────
let timerInterval=null;
function startTimer(){
  clearTimer();
  if(!st.settings.timed_mode||st.answered)return;
  st.timerVal=st.settings.timer_seconds;
  timerInterval=setInterval(()=>{
    st.timerVal--;
    const bar=document.getElementById('timer-bar');
    if(bar)bar.style.width=`${(st.timerVal/st.settings.timer_seconds)*100}%`;
    const timeEl=document.querySelector('.nav-row span');
    if(timeEl&&st.timerVal>0)timeEl.textContent=`⏱ ${st.timerVal}s`;
    if(st.timerVal<=0){clearTimer();if(!st.answered){st.sel=-1;submitAnswer();}}
  },1000);
}
function clearTimer(){clearInterval(timerInterval);timerInterval=null;}

function submitAnswer(){
  clearTimer();
  st.answered=true;
  const q=st.questions[st.cur];
  const correct=st.sel===q.correct;
  if(correct)st.score++;else st.wrong.push(q);
  st.questionLog.push({section_id:q.section||st.selectedSections[0],question_text:q.question,correct,user_id:st.userId});
  // Update daily count
  st.todayCount++;
  localStorage.setItem('todayCount',st.todayCount);
  render();
}

function nextQuestion(){
  st.cur++;st.sel=null;st.answered=false;
  if(st.cur>=st.questions.length){
    st.view='results';render();saveSession();
  } else {
    render();startTimer();
  }
}

async function startQuiz(){
  if(!st.selectedSections.length)return;
  st.view='loading';st.error='';render();
  try{
    const allB64=[];
    for(const sid of st.selectedSections){
      const sec=SECTIONS.find(s=>s.id===sid);
      if(!sec)continue;
      const res=await api('get-pdf',{filename:sec.file});
      if(res.error)throw new Error(`PDF error for ${sec.file}: ${res.error}`);
      if(res.b64)allB64.push(res.b64);
    }
    if(!allB64.length)throw new Error('Could not load PDF files. Check Supabase storage.');
    const b64=allB64[0];
    const selInfo=st.selectedSections.map(id=>{
      const s=SECTIONS.find(x=>x.id===id);
      return `- ${s.label} (${s.law})`;
    }).join('\n');
    const prompt=`You are an Oklahoma NHA state licensing exam coach.
Focus ONLY on these sections:
${selInfo}
1. EXTRACT any multiple choice questions already in the document (type: "extracted")
2. GENERATE new questions from those sections (type: "generated")
Generated questions MUST reference specific Oklahoma statutes/OAC rules, timeframes, thresholds, definitions.
Return ONLY valid JSON:
{"questions":[{"type":"extracted"|"generated","section":"short section name","question":"text","options":["A","B","C","D"],"correct":0,"explanation":"1-2 sentences","cite":"OAC 310:xxx or 63 O.S. § x"}]}
Return up to ${st.qCount} questions. Prioritize extracted first. Make distractors plausible.`;
    const resp=await api('generate-questions',{
      model:'claude-sonnet-4-6',max_tokens:4000,
      messages:[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
        {type:'text',text:prompt}
      ]}]
    },{'x-api-key':API_KEY});
    const text=(resp.content||[]).map(b=>b.text||'').join('');
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    st.questions=shuffle(parsed.questions);
    st.cur=0;st.score=0;st.sel=null;st.answered=false;st.wrong=[];st.questionLog=[];st.saveStatus='';
    st.view='quiz';
    render();startTimer();
  }catch(err){
    st.view='dashboard';st.error='Could not generate questions: '+err.message;render();
  }
}

// ── BOOKMARKS ─────────────────────────────────────────────────────────
async function toggleBookmark(q,forceRemove=false){
  const data=await api('toggle-bookmark',{
    user_id:st.userId,
    section_id:q.section||st.selectedSections[0],
    question_text:q.question,
    options:q.options,
    correct:q.correct,
    explanation:q.explanation||'',
    cite:q.cite||'',
  });
  // Refresh bookmarks
  const bmarks=await api('get-bookmarks');
  st.bookmarks=Array.isArray(bmarks)?bmarks:[];
  render();
}

// ── SAVE SESSION + BADGES ─────────────────────────────────────────────
async function saveSession(){
  if(!st.token)return;
  const total=st.questions.length;
  const pct=Math.round(st.score/total*100);
  st.saveStatus='Saving…';
  const el=()=>document.getElementById('save-status');
  if(el())el().textContent=st.saveStatus;
  try{
    await api('save-session',{
      session:{user_id:st.userId,section_ids:st.selectedSections,q_count:st.qCount,score:st.score,total,pct,wrong_sections:[...new Set(st.wrong.map(q=>q.section).filter(Boolean))]},
      question_results:st.questionLog,section_ids:st.selectedSections,score:st.score,total,
    });
    st.saveStatus='✓ Progress saved';
    if(el())el().textContent=st.saveStatus;
    // Refresh data
    const [prog,sess]=await Promise.all([api('get-progress'),api('get-sessions')]);
    st.progress=Array.isArray(prog)?prog:[];
    st.sessions=Array.isArray(sess)?sess:[];
    updateStreak();computeWeekly();
    // Check badges
    await checkBadges(pct);
    render();
  }catch(e){
    st.saveStatus='Could not save — '+e.message;
    if(el())el().textContent=st.saveStatus;
  }
}

async function checkBadges(pct){
  const totalQ=st.progress.reduce((a,p)=>a+p.total_questions,0);
  const totalSess=st.sessions.length;
  const earnedIds=new Set((await api('get-profile')).badges?.map(b=>b.badge_id)||[]);
  const toAward=[];

  if(totalSess>=1&&!earnedIds.has('first_quiz'))toAward.push('first_quiz');
  if(st.streak>=3&&!earnedIds.has('streak_3'))toAward.push('streak_3');
  if(st.streak>=7&&!earnedIds.has('streak_7'))toAward.push('streak_7');
  if(totalQ>=100&&!earnedIds.has('q100'))toAward.push('q100');
  if(totalQ>=500&&!earnedIds.has('q500'))toAward.push('q500');
  if(pct>=90&&!earnedIds.has('ace'))toAward.push('ace');
  if(pct===100&&!earnedIds.has('perfect'))toAward.push('perfect');
  const sectionsStudied=new Set(st.sessions.flatMap(s=>s.section_ids||[]));
  if(sectionsStudied.size>=11&&!earnedIds.has('all_sections'))toAward.push('all_sections');

  for(const badge_id of toAward){
    const res=await api('award-badge',{badge_id,user_id:st.userId});
    if(res.awarded){
      const def=BADGES_DEF.find(b=>b.id===badge_id);
      if(def)showCelebration(def);
      st.badges.push({badge_id,earned_at:new Date().toISOString()});
      await new Promise(r=>setTimeout(r,3000));// wait before next badge
    }
  }
}

function showCelebration(badge){
  document.getElementById('cel-icon').textContent=badge.icon;
  document.getElementById('cel-title').textContent='Badge Unlocked!';
  document.getElementById('cel-sub').textContent=`${badge.name} — ${badge.desc}`;
  document.getElementById('celebration').style.display='flex';
}
function closeCelebration(){document.getElementById('celebration').style.display='none';}

// ── BOOT ──────────────────────────────────────────────────────────────
if(st.token){loadDashboard();}else{render();}
</script>
